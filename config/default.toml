# Default compositor layout policy for newly managed windows.
default_layout = "floating"

[theme]
# Theme metadata currently exposed through IPC/state snapshots.
name = "catppuccin-latte"
cursor_theme = "default"
overlay_font_family = "Noto Sans"
border_color = "#5c7cfa"
background_color = "#f5f7ff"

[input]
# Effective semantics are currently `never` or `tiled-only`; `true` means tiled-only.
focus_follows_mouse = true
repeat_rate = 30

# Optional runtime keyboard-layout list. If omitted, nekoland defaults to a single `us` layout.
# [input.keyboard]
# current = "us"
#
# [[input.keyboard.layouts]]
# name = "us"
# layout = "us"
#
# [[input.keyboard.layouts]]
# name = "de"
# layout = "de"

[ipc]
command_history_limit = 64

[startup]
# Startup actions run once after the nested Wayland socket is ready.
# Common form:
# actions = [{ exec = ["waybar"] }]
actions = [{ exec = ["konsole"]}]

[xwayland]
enabled = true

[[outputs]]
name = "eDP-1"
mode = "1920x1080@60"
scale = 1
enabled = true

# Optional window rules. Only `app_id`/`title` matching and `layout`/`mode` policy are currently supported.
#
# [[window_rules]]
# app_id = "mpv"
# mode = "fullscreen"
#
# [[window_rules]]
# title = "Picture in Picture"
# layout = "floating"
#
# Wallpaper example: launch a wallpaper client at startup and pin its window to one output.
# [startup]
# actions = [{ exec = ["swaybg", "-o", "eDP-1", "-i", "/path/to/wallpaper.png", "-m", "fill"] }]
#
[[window_rules]]
app_id = "ffplay"
background = "eDP-1"

[keybinds.bindings]
# Shortcut overrides are keyed by stable shortcut id rather than by action payload.
"viewport.pan_mode" = "Super+Alt"

# Shell shortcuts.
# "system.quit" = "Super+Shift+Q"
# "window_switcher.hold" = "Alt"
# "window_switcher.cycle_next" = "Alt+Tab"
# "window_switcher.cycle_prev" = "Alt+Shift+Tab"
