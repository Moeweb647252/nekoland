default_layout = "floating"

[theme]
name = "nord-light"
cursor_theme = "Bibata-Modern-Ice"
border_color = "#81a1c1"
background_color = "#e5e9f0"

[input]
focus_follows_mouse = false
repeat_rate = 40

[input.keyboard]
current = "us"

[[input.keyboard.layouts]]
name = "us"
layout = "us"

[[input.keyboard.layouts]]
name = "de"
layout = "de"

[ipc]
command_history_limit = 128

[xwayland]
enabled = true

[[outputs]]
name = "HDMI-A-1"
mode = "2560x1440@144"
scale = 1
enabled = true

# Example wallpaper setup using an external Wayland client.
[[window_rules]]
app_id = "swaybg"
background = "HDMI-A-1"

[keybinds.bindings]
"Super+Return" = { exec = ["wezterm", "start", "--always-new-process"] }
"Super+Space" = { exec = ["wofi", "--show", "drun"] }
"Super+P" = { exec = ["wlogout", "--protocol", "layer-shell"] }
"Ctrl+Shift" = { viewport_pan_mode = true }
"Super+Shift+Q" = { close = true }
"Super+1" = { workspace = 1 }
"Super+2" = { workspace = 2 }
