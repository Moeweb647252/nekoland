default_layout = "floating"

[theme]
name = "nord-light"
cursor_theme = "Bibata-Modern-Ice"
border_color = "#81a1c1"
background_color = "#e5e9f0"

[input]
focus_follows_mouse = false
repeat_rate = 40

[ipc]
command_history_limit = 128

[xwayland]
enabled = true

[[outputs]]
name = "HDMI-A-1"
mode = "2560x1440@144"
scale = 1
enabled = true

[keybinds.bindings]
"Super+Return" = ["wezterm", "start", "--always-new-process"]
"Super+Space" = ["wofi", "--show", "drun"]
"Super+P" = ["wlogout", "--protocol", "layer-shell"]
"Super+Shift+Q" = "close-window"
"Super+1" = "workspace 1"
"Super+2" = "workspace 2"
