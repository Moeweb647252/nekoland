# Full nekoland config example.
#
# Purpose:
# - document every currently supported on-disk config key
# - show every supported keybinding action shape
# - explain validation rules and current behavior in-place
#
# Out of scope:
# - environment variables such as NEKOLAND_CONFIG / NEKOLAND_BACKEND / RUST_LOG
# - runtime-only control through `nekoland-msg`
#
# Notes:
# - this file is meant to be read and copied from, not treated as a minimal default
# - matching in window_rules is exact string equality, not regex or glob
# - `nekoland-msg query config` shows a normalized runtime snapshot, not the raw TOML

# Default policy for newly managed windows before any matching window rule is applied.
#
# Allowed values:
# - "floating"
# - "maximized"
# - "fullscreen"
# - "tiling"
# - "stacking"
#
# Current implementation detail:
# - "stacking" currently normalizes to floating layout with normal window mode
default_layout = "tiling"

[theme]
# Arbitrary theme label exposed through IPC snapshots and diagnostics.
name = "nord-light"

# Cursor theme name used by the compositor when resolving cursor assets.
cursor_theme = "Bibata-Modern-Ice"

# Decoration border color as a hex string.
border_color = "#81a1c1"

# Clear/background color as a hex string.
background_color = "#e5e9f0"

[input]
# Whether pointer motion can move focus.
#
# Current runtime behavior is effectively a boolean toggle.
focus_follows_mouse = false

# Keyboard repeat rate passed into protocol bootstrap.
repeat_rate = 40

[input.keyboard]
# Name of the layout that should start active.
#
# Requirements:
# - must match one `[[input.keyboard.layouts]].name`
# - if omitted, the first layout becomes active
current = "de"

[[input.keyboard.layouts]]
# Optional logical name.
#
# If omitted, nekoland uses the `layout` string as the logical name.
# Names must be unique after normalization.
name = "us"

# XKB layout string. Must be non-empty.
layout = "us"

# Optional XKB fields. Empty string means "unset / use backend default behavior".
rules = ""
model = ""
variant = ""
options = ""

[[input.keyboard.layouts]]
# A second layout showing the fully populated XKB fields.
name = "de"
layout = "de"
rules = "evdev"
model = "pc105"
variant = "nodeadkeys"
options = "caps:escape"

[ipc]
# Maximum number of command history records retained by the compositor.
#
# Behavior:
# - values > 0 keep a bounded ring buffer
# - value 0 clears the history and disables retention
command_history_limit = 128

[startup]
# Startup actions run once after the nested Wayland socket is ready.
#
# Additional behavior:
# - if XWayland is enabled, startup waits until XWayland is ready too
# - the action objects use the same schema as keybindings
# - `viewport_pan_mode` is keybinding-only and is not valid here
#
# This array is intentionally small even though more action shapes are supported:
# the comprehensive action catalog is demonstrated below in [keybinds.bindings].
actions = [
  { exec = ["waybar"] },
  { workspace_create = "dev" },
  { workspace = "dev" },
  { exec = ["wezterm", "start", "--always-new-process"] },
]

[xwayland]
# Enable or disable XWayland startup.
enabled = true

[[outputs]]
# Output names must match backend-visible output names.
name = "HDMI-A-1"

# Output mode string is currently passed through as-is to backend control paths.
mode = "2560x1440@144"

# Output scale is normalized to >= 1.
scale = 1

# Initial enabled state for this output.
enabled = true

[[outputs]]
# Multiple outputs are supported.
name = "eDP-1"
mode = "1920x1080@60"
scale = 1
enabled = false

[[window_rules]]
# Match by app_id.
app_id = "mpv"

# Optional layout override applied after the global default layout.
#
# Allowed values:
# - "tiled"
# - "floating"
layout = "floating"

# Optional mode override.
#
# Allowed values:
# - "normal"
# - "maximized"
# - "fullscreen"
# - "hidden"
mode = "fullscreen"

[[window_rules]]
# Match by title instead of app_id.
title = "Picture in Picture"
layout = "floating"

[[window_rules]]
# Background rule example.
#
# Matching windows can be marked as output background content.
app_id = "swaybg"
background = "HDMI-A-1"

[keybinds.bindings]
# Binding syntax rules:
# - `viewport_pan_mode` is the only modifier-only binding form
# - normal keybindings are currently ignored by the compositor input pipeline
# - binding strings are case-insensitive for supported tokens
#
# Supported modifier tokens:
# - Ctrl / Control
# - Alt
# - Shift
# - Super / Logo / Meta
#
# viewport_pan_mode:
# Special keybinding-only action. Hold the configured modifiers and move the
# pointer to pan the focused output viewport.
#
# Rules:
# - must be the only action in the binding
# - may be configured at most once
# - binding must contain only modifiers
# - binding must contain at least one modifier
"Ctrl+Shift" = { viewport_pan_mode = true }
